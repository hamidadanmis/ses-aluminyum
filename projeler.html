<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projelerimiz | Ses Alüminyum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        .project-card:hover img { transform: scale(1.1); transition: 0.5s; }
        .overlay { background: rgba(30, 58, 138, 0.9); opacity: 0; transition: 0.3s; }
        .project-card:hover .overlay { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-black text-blue-900">SES ALÜMİNYUM</div>
            <div class="space-x-8 text-sm font-bold uppercase tracking-wider">
                <a href="index.html" class="hover:text-blue-700">Ana Sayfa</a>
                <a href="projeler.html" class="text-blue-700">Projeler</a>
                <a href="iletisim.html" class="hover:text-blue-700">İletişim</a>
            </div>
        </div>
    </nav>

    <section class="bg-blue-900 py-20 text-white text-center">
        <h1 class="text-4xl font-bold tracking-widest uppercase">PROJELERİMİZ</h1>
        <p class="mt-4 text-blue-200">Panelden eklediğiniz tüm projeler burada otomatik listelenir.</p>
    </section>

    <section class="py-16 container mx-auto px-6">
        <div id="project-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-center col-span-full text-gray-400">Projeler yükleniyor...</p>
        </div>
    </section>

    <script>
        async function projeleriYukle() {
            const container = document.getElementById('project-list');
            
            // SENİN BİLGİLERİN (Burayı kontrol et)
            const username = "hamidadanmis"; // GitHub kullanıcı adın
            const repo = "ses-aluminyum";    // Repo adın
            
            try {
                // 1. GitHub API ile content/projeler klasöründeki dosyaları listele
                const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/content/projeler`);
                const files = await response.json();
                
                container.innerHTML = ''; // Temizle

                for (const file of files) {
                    if (file.name.endsWith('.md')) {
                        // 2. Her .md dosyasının içeriğini çek
                        const contentRes = await fetch(file.download_url);
                        const text = await contentRes.text();

                        // 3. Markdown içindeki başlık ve resim linkini ayıkla (Basit Regex)
                        const title = text.match(/title:\s*(.*)/)?.[1]?.replace(/['"]/g, '') || "İsimsiz Proje";
                        const thumb = text.match(/thumbnail:\s*(.*)/)?.[1]?.replace(/['"]/g, '') || "https://via.placeholder.com/600x400";

                        // 4. HTML Kartını oluştur ve ekle
                        container.innerHTML += `
                            <div class="project-card relative overflow-hidden bg-white shadow-lg aspect-video group">
                                <img src="${thumb}" class="w-full h-full object-cover">
                                <div class="overlay absolute inset-0 flex flex-col items-center justify-center text-white p-4">
                                    <h3 class="text-xl font-bold text-center uppercase">${title}</h3>
                                    <div class="mt-4 border-b-2 border-white w-12"></div>
                                </div>
                            </div>
                        `;
                    }
                }
            } catch (err) {
                container.innerHTML = '<p class="text-center col-span-full">Henüz proje eklenmemiş veya bir hata oluştu.</p>';
                console.error(err);
            }
        }

        projeleriYukle();
    </script>
</body>
</html>
