<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projelerimiz | Ses Alüminyum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        .project-card:hover img { transform: scale(1.1); transition: 0.5s; }
        .overlay { background: rgba(30, 58, 138, 0.8); opacity: 0; transition: 0.3s; }
        .project-card:hover .overlay { opacity: 1; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="container mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-3xl font-black tracking-tighter text-blue-800">SES</span>
                <span class="text-xl font-light tracking-widest text-gray-500 uppercase">Alüminyum</span>
            </div>
            <div class="hidden lg:flex space-x-10 text-sm font-bold uppercase tracking-widest text-gray-700">
                <a href="index.html" class="hover:text-blue-700">Ana Sayfa</a>
                <a href="kurumsal.html" class="hover:text-blue-700">Kurumsal</a>
                <a href="sistemler.html" class="hover:text-blue-700">Sistemler</a>
                <a href="projeler.html" class="text-blue-700">Projeler</a>
                <a href="iletisim.html" class="hover:text-blue-700">İletişim</a>
            </div>
        </div>
    </nav>

    <section class="bg-blue-900 py-24 text-white text-center">
        <h1 class="text-4xl font-bold uppercase tracking-[0.2em]">Referans Projelerimiz</h1>
        <p class="mt-4 text-blue-200 font-light tracking-wide">Ses Alüminyum güvencesiyle tamamlanan seçkin yapılar.</p>
    </section>

    <section class="py-20 container mx-auto px-8">
        <div id="project-container" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            <p class="text-gray-400 text-center col-span-full italic">Projeler güncelleniyor...</p>
        </div>
    </section>

    <footer class="bg-white border-t py-10">
        <div class="container mx-auto px-8 text-center text-gray-400 text-xs tracking-widest uppercase">
            &copy; 2026 SES ALÜMİNYUM | Kalite ve Güvenin Sesi.
        </div>
    </footer>

    <script>
        async function loadProjects() {
            const container = document.getElementById('project-container');
            const repoOwner = 'hamidadanmis';
            const repoName = 'ses-aluminyum';
            const folderPath = 'content/projeler';

            try {
                // GitHub API üzerinden klasördeki dosyaları çekiyoruz
                const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`);
                
                if (!response.ok) throw new Error('Dosyalar alınamadı');
                
                const files = await response.json();
                container.innerHTML = ''; 

                files.forEach(file => {
                    if (file.name.endsWith('.md')) {
                        // Dosya isminden başlık oluşturma (Örn: "modern-plaza.md" -> "MODERN PLAZA")
                        const title = file.name
                            .replace('.md', '')
                            .replace(/-/g, ' ')
                            .toUpperCase();

                        const cardHtml = `
                            <div class="project-card relative overflow-hidden bg-gray-200 aspect-video group cursor-pointer">
                                <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=800" class="w-full h-full object-cover">
                                <div class="overlay absolute inset-0 flex flex-col items-center justify-center text-white p-6">
                                    <h3 class="text-xl font-bold uppercase text-center">${title}</h3>
                                    <p class="text-sm mt-2">Detaylar Panleden Eklendi</p>
                                </div>
                            </div>
                        `;
                        container.innerHTML += cardHtml;
                    }
                });

                if (container.innerHTML === '') {
                    container.innerHTML = '<p class="text-gray-500 text-center col-span-full">Henüz eklenmiş bir proje bulunamadı.</p>';
                }

            } catch (error) {
                console.error("Hata:", error);
                container.innerHTML = '<p class="text-red-500 text-center col-span-full">Projeler yüklenirken bir hata oluştu.</p>';
            }
        }

        // Sayfa yüklendiğinde projeleri getir
        loadProjects();
    </script>
</body>
</html>
