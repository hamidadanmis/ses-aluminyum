backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  # 1. KOLEKSİYON: PROJELER (Klasör tabanlı)
  - name: "projeler"
    label: "Projelerimiz"
    folder: "content/projeler"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Proje Adı", name: "title", widget: "string"}
      - {label: "Proje Tarihi", name: "date", widget: "datetime"}
      - {label: "Kapak Görseli", name: "image", widget: "image"}
      - {label: "Proje Detayı", name: "body", widget: "markdown"}

  # 2. KOLEKSİYON: SAYFALAR (Dosya tabanlı)
  - name: "sayfalar"
    label: "Sayfa İçerikleri"
    files:
      - file: "index.html"
        label: "Ana Sayfa"
        name: "index"
        fields:
          - {label: "Hero Başlık", name: "title", widget: "string"}
          - {label: "Hero Alt Yazı", name: "subtitle", widget: "text"}

      - file: "kurumsal.html"
        label: "Kurumsal / Hakkımızda"
        name: "kurumsal"
        fields:
          - {label: "Sayfa Başlığı", name: "title", widget: "string"}
          - {label: "Biz Kimiz İçeriği", name: "body", widget: "markdown"}

      - file: "sistemler.html"
        label: "Sistemlerimiz"
        name: "sistemler"
        fields:
          - {label: "Başlık", name: "title", widget: "string"}
          - {label: "Sistem Listesi", name: "body", widget: "markdown"}

      - file: "iletisim.html"
        label: "İletişim Bilgileri"
        name: "iletisim"
        fields:
          - {label: "Adres", name: "address", widget: "string"}
          - {label: "Telefon", name: "phone", widget: "string"}
          - {label: "E-posta", name: "email", widget: "string"}
          - {label: "WhatsApp Hattı", name: "whatsapp", widget: "string"}
