backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "ayarlar"
    label: "⚙️ Genel Site Ayarları"
    files:
      - file: "data/settings.json"
        label: "Logo ve İletişim Bilgileri"
        name: "general"
        fields:
          - {label: "Firma Adı", name: "site_name", widget: "string"}
          - {label: "Site Logosu", name: "logo", widget: "image"}
          - {label: "Telefon", name: "phone", widget: "string"}
          - {label: "E-posta", name: "email", widget: "string"}
          - {label: "Adres", name: "address", widget: "text"}

  - name: "sayfalar"
    label: "📄 Sayfa İçerikleri"
    files:
      - file: "content/index.json"
        label: "Ana Sayfa"
        name: "index"
        fields:
          - {label: "Hero Başlık", name: "hero_title", widget: "string"}
          - {label: "Hero Alt Yazı", name: "hero_subtitle", widget: "text"}
          - {label: "Hero Arkaplan", name: "hero_bg", widget: "image"}

  - name: "projeler"
    label: "🏗️ Projelerimiz"
    folder: "content/projeler"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Proje Adı", name: "title", widget: "string"}
      - label: "Proje Yılı"
        name: "date"
        widget: "datetime"
        format: "YYYY"
        date_format: "YYYY"
        time_format: false
      - {label: "Proje Resmi", name: "thumbnail", widget: "image"}
      - {label: "Detaylar", name: "body", widget: "markdown"}
